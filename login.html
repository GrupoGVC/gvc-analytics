<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GVC Analytics | Login</title>
    <link rel="icon" type="image/png" href="/assets/logo_grupogvc.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/login-responsivo.css" />
  </head>
  <body>
    <div class="bg">
      <video class="bg-video" autoplay loop muted playsinline preload="auto">
        <source src="assets/background.mp4" type="video/mp4" />
      </video>
    </div>

    <div class="card" id="card">
      <div class="logo">
        <div class="logo-title">GVC <em>Analytics</em></div>
        <div class="logo-sub">Dashboard de Vendas · Grupo GVC</div>
      </div>

      <form id="form-login" onsubmit="return false;">
        <div class="field">
          <label for="inp-user">Usuário</label>
          <input
            id="inp-user"
            type="text"
            placeholder="seu.usuario"
            autocomplete="username"
            autofocus
          />
        </div>
        <div class="field">
          <label for="inp-pass">Senha</label>
          <input
            id="inp-pass"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            onkeydown="if (event.key === 'Enter') submitLogin();"
          />
        </div>

        <div class="error-msg" id="err-msg"></div>

        <button class="btn-login" id="btn-login" onclick="submitLogin()">
          Entrar
        </button>
      </form>

      <div class="footer-note">Acesso restrito · GVC Analytics 2026</div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
